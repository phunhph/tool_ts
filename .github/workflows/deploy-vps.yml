name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          # Đưa biến môi trường trực tiếp vào câu lệnh để tránh lỗi truyền biến
          script: |
            # 1. Nạp đường dẫn NVM và Node vào phiên làm việc SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 2. Ép sử dụng đúng version node bạn đang có (v16.20.0)
            nvm use v16.20.0 || echo "Using default node"

            # Các biến cũ của bạn
            export APP_DIR="/var/www/polytest"
            export DEPLOY_BRANCH="main"
            export APP_NAME="polytest"

            echo "[DEPLOY] Bat dau tai: $(date)"
            
            cd "$APP_DIR"
            git fetch --all
            git checkout -f "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            echo "[DEPLOY] Dang cai dependencies..."
            # Bây giờ lệnh npm sẽ hoạt động vì đã nạp nvm.sh ở trên
            npm install --omit=dev

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            # Khởi động app
            ENTRY_FILE="server.js"
            if [ ! -f "$ENTRY_FILE" ] && [ -f "index.js" ]; then ENTRY_FILE="index.js"; fi
            
            pm2 delete "$APP_NAME" || true
            pm2 start "$ENTRY_FILE" --name "$APP_NAME"
            pm2 save
            echo "[DEPLOY] Hoan tat!"